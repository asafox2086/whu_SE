<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>星轨平台 MVP</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">星轨平台 MVP</p>
        <h1>校园竞赛与科研机会工作台</h1>
      </div>
      <div class="session-tools">
        <span class="user-badge" data-user-badge>未登录</span>
        <button class="secondary" data-profile-link hidden>个人主页</button>
        <button class="secondary" data-logout hidden>退出登录</button>
      </div>
    </header>

    <main class="layout is-auth-screen" data-app-content>
      <section class="panel auth-panel" data-auth-panel>
        <h2>用户入口</h2>
        <form data-auth-form>
          <label>
            权限身份
            <select name="role">
              <option value="student">学生</option>
              <option value="mentor">导师</option>
              <option value="certificate_collector">证书收集者</option>
              <option value="admin">管理员</option>
            </select>
          </label>
          <label>
            姓名
            <input name="name" autocomplete="name" placeholder="陈星">
          </label>
          <label>
            邮箱
            <input name="email" type="email" autocomplete="email" required placeholder="chenxing@whu.edu.cn">
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="current-password" required placeholder="至少 8 位">
          </label>
          <label>
            专业
            <input name="major" placeholder="软件工程">
          </label>
          <label>
            GitHub
            <input name="githubUrl" placeholder="https://github.com/you">
          </label>
          <label>
            院系
            <input name="department" placeholder="计算机学院">
          </label>
          <p class="form-message" data-auth-message></p>
          <div class="button-row">
            <button name="mode" value="login" type="submit">登录</button>
            <button name="mode" value="register" type="submit" class="secondary">注册并进入</button>
          </div>
        </form>
      </section>

      <section class="panel opportunities" data-app-panel data-page-panel="home" hidden>
        <div class="section-head">
          <div>
            <p class="eyebrow">机会大厅</p>
            <h2>竞赛与科研项目</h2>
          </div>
          <div class="segmented" data-opportunity-filters>
            <button class="is-active" data-type="all">全部</button>
            <button data-type="competition">竞赛</button>
            <button data-type="research">科研</button>
          </div>
        </div>
        <div class="card-grid" data-opportunity-list></div>
        <nav class="pagination" data-opportunity-pagination aria-label="机会分页"></nav>
      </section>

      <section class="detail-panel" data-detail-panel data-app-panel data-page-panel="opportunity-detail" hidden>
        <p class="eyebrow">详情</p>
        <h2>选择一个机会</h2>
        <p>查看竞赛招募或科研申请入口。</p>
      </section>

      <section class="profile-panel" data-profile-panel data-app-panel data-page-panel="profile" hidden>
        <p class="eyebrow">个人主页</p>
        <h2>学生主页</h2>
        <div data-profile-view></div>
        <form data-profile-form hidden></form>
        <div data-profile-certificates></div>
      </section>

      <section class="student-record-grid" data-role-panel="student" data-app-panel data-page-panel="home" hidden>
        <section class="panel action-panel">
          <h2>我的组队公告</h2>
          <div class="stack" data-student-recruits></div>
          <nav class="pagination compact-pagination" data-student-recruits-pagination aria-label="我的招募分页"></nav>
        </section>

        <section class="panel action-panel">
          <h2>我的科研申请</h2>
          <div class="stack" data-student-applications></div>
          <nav class="pagination compact-pagination" data-student-applications-pagination aria-label="我的申请分页"></nav>
        </section>
      </section>

      <section class="support-grid" data-app-panel data-page-panel="home" hidden>
        <section class="panel certificate-panel" data-role-panel="student" data-app-panel data-page-panel="home" hidden>
          <p class="eyebrow">证书中心</p>
          <h2>上传与查看证书</h2>
          <form data-certificate-form>
            <label>
              关联竞赛
              <select name="competitionId"></select>
            </label>
            <label>
              奖项等级
              <input name="awardLevel" required placeholder="二等奖">
            </label>
            <label>
              获奖时间
              <input name="awardDate" type="date" required>
            </label>
            <label>
              证书文件
              <input name="file" type="file" accept=".pdf,.jpg,.jpeg,.png" required>
            </label>
            <button type="submit">保存记录</button>
          </form>
          <div class="stack" data-certificate-list></div>
          <nav class="pagination compact-pagination" data-certificate-list-pagination aria-label="个人证书分页"></nav>
        </section>

        <section class="panel feedback-panel" data-app-panel data-page-panel="home" hidden>
          <p class="eyebrow">MVP 验证</p>
          <h2>使用反馈</h2>
          <form data-feedback-form>
            <label>
              联系方式
              <input name="contact" required placeholder="邮箱 / QQ / 微信">
            </label>
            <label>
              用户痛点
              <input name="painPoint" required placeholder="找队友信息太分散">
            </label>
            <label>
              评分
              <select name="rating">
                <option value="5">5</option>
                <option value="4">4</option>
                <option value="3">3</option>
                <option value="2">2</option>
                <option value="1">1</option>
              </select>
            </label>
            <label>
              反馈内容
              <textarea name="message" required placeholder="写下这次试用哪里顺、哪里卡"></textarea>
            </label>
            <button type="submit">提交反馈</button>
          </form>
          <div class="stack" data-feedback-list></div>
          <nav class="pagination compact-pagination" data-feedback-list-pagination aria-label="反馈分页"></nav>
        </section>
      </section>

      <section class="panel certificate-panel" data-role-panel="certificate_collector" data-app-panel data-page-panel="home" hidden>
        <p class="eyebrow">证书中心</p>
        <h2>证书汇总</h2>
        <div class="stack" data-certificate-collection></div>
        <nav class="pagination compact-pagination" data-certificate-collection-pagination aria-label="证书汇总分页"></nav>
      </section>

      <section class="panel admin-panel" data-role-panel="admin" data-app-panel data-page-panel="home" hidden>
        <p class="eyebrow">管理员模式</p>
        <h2>注册用户</h2>
        <div class="stack" data-admin-users></div>
        <nav class="pagination compact-pagination" data-admin-users-pagination aria-label="注册用户分页"></nav>
        <h2>新增机会</h2>
        <div class="admin-editor-grid">
          <form data-admin-competition-form>
            <h3>新增竞赛</h3>
            <label>
              竞赛名称
              <input name="title" required placeholder="蓝桥杯全国软件和信息技术专业人才大赛">
            </label>
            <label>
              级别
              <input name="level" required placeholder="国家级">
            </label>
            <label>
              官网
              <input name="officialUrl" type="url" required placeholder="https://example.com">
            </label>
            <label>
              交流群
              <input name="qqGroup" required placeholder="845678901">
            </label>
            <div class="form-grid">
              <label>
                开始时间
                <input name="startDate" type="date" required>
              </label>
              <label>
                结束时间
                <input name="endDate" type="date" required>
              </label>
            </div>
            <label>
              简介
              <textarea name="description" required placeholder="适合算法、软件开发和电子信息方向同学报名。"></textarea>
            </label>
            <button type="submit">新增竞赛</button>
          </form>
          <form data-admin-research-form>
            <h3>新增科研项目</h3>
            <label>
              项目名称
              <input name="title" required placeholder="多模态课程资源检索系统">
            </label>
            <label>
              方向
              <input name="direction" required placeholder="信息检索">
            </label>
            <label>
              技术栈
              <input name="techStack" required placeholder="Python, Vue, 向量数据库">
            </label>
            <label>
              交流群
              <input name="qqGroup" required placeholder="856789012">
            </label>
            <label>
              状态
              <select name="status">
                <option value="招募中">招募中</option>
                <option value="已结束">已结束</option>
              </select>
            </label>
            <label>
              简介
              <textarea name="description" required placeholder="围绕课程资料构建可检索、可问答的原型系统。"></textarea>
            </label>
            <button type="submit">新增科研项目</button>
          </form>
        </div>
        <h2>数据库</h2>
        <div class="database-grid" data-admin-database></div>
        <nav class="pagination compact-pagination" data-admin-database-pagination aria-label="数据库分页"></nav>
      </section>

      <section class="panel mentor-panel" data-role-panel="mentor" data-app-panel data-page-panel="home" hidden>
        <p class="eyebrow">导师侧演示</p>
        <h2>我的科研项目</h2>
        <form data-mentor-research-form>
          <label>
            项目名称
            <input name="title" required placeholder="可信软件测试工具">
          </label>
          <label>
            方向
            <input name="direction" required placeholder="软件工程">
          </label>
          <label>
            技术栈
            <input name="techStack" required placeholder="JavaScript, 自动化测试">
          </label>
          <label>
            交流群
            <input name="qqGroup" required placeholder="867890123">
          </label>
          <label>
            状态
            <select name="status">
              <option value="招募中">招募中</option>
              <option value="已结束">已结束</option>
            </select>
          </label>
          <label>
            简介
            <textarea name="description" required placeholder="面向课程项目构建自动化测试和质量分析工具。"></textarea>
          </label>
          <button type="submit">发布科研项目</button>
        </form>
        <div class="stack" data-mentor-projects></div>
        <nav class="pagination compact-pagination" data-mentor-projects-pagination aria-label="导师项目分页"></nav>
        <h2>科研申请队列</h2>
        <div class="stack" data-mentor-applications></div>
        <nav class="pagination compact-pagination" data-mentor-applications-pagination aria-label="科研申请队列分页"></nav>
      </section>

    </main>

    <aside class="toast" data-toast hidden></aside>
    <script type="module" src="/src/app.mjs"></script>
  </body>
</html>
